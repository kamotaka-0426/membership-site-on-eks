apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - hpa.yaml

namespace: prod

images:
  - name: membership-blog-api
    newName: membership-blog-api-prod # CI/CD will update this to ECR URL
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: membership-blog-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
